<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Gestor de Tareas</h1>
  </header>

  <main class="layout">

    <aside class="sidebar">
      <h2>Categorías</h2>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Estudio</li>
      </ul>
    </aside>

    <section class="content">
      <h2>Mis Tareas</h2>

      <div class="task high">
        <span class="title">Diseñar interfaz</span>
        <span class="category">Trabajo</span>
        <span class="badge">Alta</span>
      </div>

      <div class="task medium">
        <span class="title">Hacer ejercicio</span>
        <span class="category">Personal</span>
        <span class="badge">Media</span>
      </div>

      <div class="task low">
        <span class="title">Leer documentación</span>
        <span class="category">Estudio</span>
        <span class="badge">Baja</span>
      </div>

    </section>

  </main>

</body>
</html>
