<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Gestor de Tareas</h1>
  </header>

  <main class="layout">

   <aside class="sidebar">
    <h2>Categorías</h2>

    <ul class="category-list">
        <li data-category="Proyectos">
            <span>Proyectos</span>
            <span class="count">4</span>
        </li>

        <li data-category="Desarrollo">
            <span>Desarrollo</span>
            <span class="count">2</span>
        </li>

        <li data-category="Personal">
            <span>Personal</span>
            <span class="count">3</span>
        </li>
    </ul>
</aside>

    <section class="content">
      <h2>Mis Tareas</h2>

      <div class="task">
    <div class="task-info">
        <h3>Diseñar landing page</h3>
        <span class="category">Trabajo</span>
    </div>
    <span class="badge urgent">Urgente</span>
</div>

<div class="task">
    <div class="task-info">
        <h3>Estudiar CSS Grid</h3>
        <span class="category">Estudio</span>
    </div>
    <span class="badge progress">En progreso</span>
</div>

<div class="task">
    <div class="task-info">
        <h3>Ir al gimnasio</h3>
        <span class="category">Personal</span>
    </div>
    <span class="badge optional">Opcional</span>
</div>

    </section>

  </main>
  
<script>
    const categories = document.querySelectorAll('.category-list li');
    const title = document.querySelector('.content h2');

    categories.forEach(category => {
        category.addEventListener('click', () => {

            // Quitar active de todos
            categories.forEach(cat => cat.classList.remove('active'));

            // Agregar active al seleccionado
            category.classList.add('active');

            // Cambiar título principal
            const selected = category.dataset.category;
            title.textContent = "Tareas - " + selected;
        });
    });
</script>

</body>
</html>
