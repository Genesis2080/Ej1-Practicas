<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Tareas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Gestor de Tareas</h1>
  </header>

  <main class="layout">

    <aside class="sidebar">
      <h2>Categorías</h2>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Estudio</li>
      </ul>
    </aside>

    <section class="content">
      <h2>Mis Tareas</h2>

      <div class="task">
    <div class="task-info">
        <h3>Diseñar landing page</h3>
        <span class="category">Trabajo</span>
    </div>
    <span class="badge urgent">Urgente</span>
</div>

<div class="task">
    <div class="task-info">
        <h3>Estudiar CSS Grid</h3>
        <span class="category">Estudio</span>
    </div>
    <span class="badge progress">En progreso</span>
</div>

<div class="task">
    <div class="task-info">
        <h3>Ir al gimnasio</h3>
        <span class="category">Personal</span>
    </div>
    <span class="badge optional">Opcional</span>
</div>

    </section>

  </main>

</body>
</html>
